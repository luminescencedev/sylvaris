<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>OG Card — Sylvaris</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap"
    rel="stylesheet"
  />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0d1610;
      font-family: 'Cinzel', Georgia, serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background image */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('./screen/sylvaris1.png');
      background-size: cover;
      background-position: center 40%;
      filter: brightness(0.25) saturate(0.7);
    }

    /* Vignette + color overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 70% at 50% 50%, transparent 30%, #0d1610 100%),
        linear-gradient(180deg, rgba(13,22,16,0.6) 0%, rgba(13,22,16,0.2) 50%, rgba(13,22,16,0.8) 100%);
    }

    /* Border frame */
    .frame {
      position: absolute;
      inset: 28px;
      border: 1px solid rgba(196,152,60,0.25);
      border-radius: 4px;
      pointer-events: none;
    }
    .frame::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(196,152,60,0.10);
      border-radius: 2px;
    }

    /* Corner ornaments */
    .corner {
      position: absolute;
      width: 22px;
      height: 22px;
    }
    .corner-tl { top: 28px; left: 28px; border-top: 2px solid #c4983c; border-left: 2px solid #c4983c; }
    .corner-tr { top: 28px; right: 28px; border-top: 2px solid #c4983c; border-right: 2px solid #c4983c; }
    .corner-bl { bottom: 28px; left: 28px; border-bottom: 2px solid #c4983c; border-left: 2px solid #c4983c; }
    .corner-br { bottom: 28px; right: 28px; border-bottom: 2px solid #c4983c; border-right: 2px solid #c4983c; }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: auto;
      margin-bottom: 28px;
      filter: drop-shadow(0 0 20px rgba(196,152,60,0.4));
    }

    .divider-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      color: rgba(196,152,60,0.5);
    }
    .divider-top span { font-size: 18px; letter-spacing: 0.3em; }
    .divider-top::before, .divider-top::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: rgba(196,152,60,0.35);
    }

    .title {
      font-family: 'Cinzel Decorative', 'Cinzel', Georgia, serif;
      font-size: 88px;
      font-weight: 700;
      color: #e4dccb;
      letter-spacing: 0.12em;
      line-height: 1;
      text-shadow:
        0 0 60px rgba(196,152,60,0.3),
        0 2px 4px rgba(0,0,0,0.8);
      margin-bottom: 18px;
    }

    .subtitle {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 22px;
      font-style: italic;
      color: rgba(196,152,60,0.85);
      letter-spacing: 0.06em;
      margin-bottom: 32px;
    }

    .divider-bot {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .divider-bot::before, .divider-bot::after {
      content: '';
      display: block;
      width: 100px;
      height: 1px;
      background: rgba(196,152,60,0.3);
    }
    .diamond {
      width: 7px;
      height: 7px;
      background: #c4983c;
      transform: rotate(45deg);
      opacity: 0.7;
    }

    .tagline {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(154,175,158,0.8);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Bottom URL */
    .url {
      position: absolute;
      bottom: 44px;
      right: 52px;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 12px;
      color: rgba(154,175,158,0.45);
      letter-spacing: 0.1em;
    }

    /* KCRP badge */
    .badge {
      position: absolute;
      top: 48px;
      right: 52px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(76,175,130,0.85);
      text-transform: uppercase;
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf82;
      box-shadow: 0 0 8px rgba(76,175,130,0.8);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="frame"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="badge">
      <div class="badge-dot"></div>
      KCRP
    </div>

    <div class="content">
      <img src="./screen/sylvaris_logo.png" alt="" class="logo" />

      <div class="divider-top">
        <span>✦</span>
      </div>

      <div class="title">Sylvaris</div>
      <div class="subtitle">Bibliothèque de la Cité Elfique</div>

      <div class="divider-bot">
        <div class="diamond"></div>
      </div>

      <div class="tagline">Personnages · Histoire · Chroniques</div>
    </div>

    <div class="url">sylvaris.carabine.studio</div>
  </div>
</body>
</html>
