<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- background -->
  <rect width="100" height="100" rx="20" fill="#09140b"/>

  <!-- main branches -->
  <path d="M50 52 C 43 41, 32 32, 28 20" stroke="#c4983c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M50 52 C 57 41, 68 32, 72 20" stroke="#c4983c" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- secondary branches -->
  <path d="M40 38 C 35 33, 31 30, 29 26" stroke="#c4983c" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M60 38 C 65 33, 69 30, 71 26" stroke="#c4983c" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- crown tip -->
  <line x1="50" y1="20" x2="50" y2="10" stroke="#c4983c" stroke-width="7" stroke-linecap="round"/>

  <!-- leaf at crown -->
  <ellipse cx="50" cy="10" rx="5" ry="6" fill="#c4983c" opacity="0.45"/>

  <!-- trunk -->
  <line x1="50" y1="52" x2="50" y2="77" stroke="#c4983c" stroke-width="7" stroke-linecap="round"/>

  <!-- roots -->
  <path d="M50 77 C 45 80, 40 83, 36 88" stroke="#c4983c" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M50 77 C 55 80, 60 83, 64 88" stroke="#c4983c" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.65"/>

  <!-- center diamond frame -->
  <rect x="41.5" y="41.5" width="17" height="17" rx="1.5" transform="rotate(45 50 50)" fill="#09140b" stroke="#c4983c" stroke-width="4.5"/>

  <!-- center gem -->
  <circle cx="50" cy="50" r="5.5" fill="#c4983c"/>
</svg>
